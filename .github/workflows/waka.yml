name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      # Updating this workflow file triggers one README Code Time refresh.
      - ".github/workflows/waka.yml"

concurrency:
  group: waka-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README Code Time
    runs-on: ubuntu-latest
    env:
      WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
      WAKATIME_PROFILE_URL: https://wakatime.com/@Dyu20705
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README with WakaTime Code Time
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          readme_path = Path("README.md")
          start = "<!--START_SECTION:waka-->"
          end = "<!--END_SECTION:waka-->"
          api_key = os.environ.get("WAKATIME_API_KEY", "").strip()
          profile_url = os.environ.get("WAKATIME_PROFILE_URL", "https://wakatime.com")

          def replace_section(body: str) -> None:
              readme = readme_path.read_text(encoding="utf-8")
              pattern = re.compile(rf"{re.escape(start)}.*?{re.escape(end)}", re.DOTALL)
              replacement = f"{start}\n{body.strip()}\n{end}"
              if not pattern.search(readme):
                  print("::error::README.md is missing WakaTime section markers")
                  sys.exit(1)
              updated = pattern.sub(replacement, readme, count=1)
              readme_path.write_text(updated, encoding="utf-8")

          if not api_key:
              replace_section(
                  "> Code Time is not available yet because `WAKATIME_API_KEY` is not configured."
              )
              print("::notice title=WakaTime skipped::Missing WAKATIME_API_KEY repository secret")
              sys.exit(0)

          url = "https://wakatime.com/api/v1/users/current/all_time_since_today?api_key=" + urllib.parse.quote(api_key)
          request = urllib.request.Request(url, headers={"User-Agent": "Dyu20705-readme-code-time"})

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except Exception as exc:
              print(f"::error::Failed to fetch WakaTime all-time stats: {exc}")
              sys.exit(1)

          code_time = str(payload.get("data", {}).get("text") or "").strip()
          if not code_time:
              replace_section(
                  "> Code Time is available, but WakaTime has not reported coding activity yet.\n\n"
                  f"_Last checked: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}_"
              )
              print("::notice title=WakaTime empty::WakaTime returned no all-time coding text")
              sys.exit(0)

          encoded_code_time = urllib.parse.quote(code_time, safe="")
          badge = f"[![Code Time](https://img.shields.io/badge/Code%20Time-{encoded_code_time}-blue?style=flat)]({profile_url})"
          updated_at = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          replace_section(f"{badge}\n\n_Last updated: {updated_at}_")
          print(f"Code Time updated: {code_time}")
          PY

      - name: Commit README update
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update WakaTime code time"
          git push

# Trigger refresh: 2026-07-09T04:00:00Z
