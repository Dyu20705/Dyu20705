name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.WAKATIME_API_KEY }}" ]; then
            echo "::error::Missing secret WAKATIME_API_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "::error::Missing secret GH_TOKEN"
            exit 1
          fi

      - name: Ensure push branch exists locally
        shell: bash
        run: |
          if ! git show-ref --verify --quiet refs/heads/chore/waka-update; then
            git branch chore/waka-update
          fi

      - name: Update README with WakaTime stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # Must be a Personal Access Token secret, not the default GITHUB_TOKEN
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Push to a separate branch then open/update PR to avoid direct-push protection on main
          PUSH_BRANCH_NAME: "chore/waka-update"
          PULL_BRANCH_NAME: "main"
          SHOW_OS: "true"
          SHOW_PROJECTS: "true"
          SHOW_EDITORS: "true"
          SHOW_TIMEZONE: "true"
          SHOW_LINES_OF_CODE: "true"
          SHOW_LOC_CHART: "true"
          # Avoid GitHub traffic API (/traffic/views) permission issues
          SHOW_PROFILE_VIEWS: "false"
          SYMBOL_VERSION: "2"
