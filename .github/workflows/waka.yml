name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README with WakaTime stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # Must be a Personal Access Token secret, not the default GITHUB_TOKEN
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "true"
          SHOW_PROJECTS: "true"
          SHOW_EDITORS: "true"
          SHOW_TIMEZONE: "true"
          SHOW_LINES_OF_CODE: "true"
          SHOW_LOC_CHART: "true"
          SYMBOL_VERSION: "2"
